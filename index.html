<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regestra — Art That Connects People Who Care</title>
    <meta name="description" content="Regestra is where artists and art lovers find each other. Share your work, discover what moves you, and connect with people who truly see it." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- ── Open Graph (iMessage, WhatsApp, Facebook, LinkedIn) ── -->
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://www.regestra.com/" />
    <meta property="og:title"        content="Regestra — Art That Connects People Who Care" />
    <meta property="og:description"  content="Where artists and art lovers find each other. Share your work, discover what moves you, and connect with people who truly see it." />
    <meta property="og:image"        content="https://www.regestra.com/og-image.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="Regestra — Art platform for artists and art lovers" />
    <meta property="og:site_name"    content="Regestra" />
    <meta property="og:locale"       content="en_US" />

    <!-- ── Twitter / X Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@regestra" />
    <meta name="twitter:title"       content="Regestra — Art That Connects People Who Care" />
    <meta name="twitter:description" content="Where artists and art lovers find each other. Share your work, discover what moves you, and connect with people who truly see it." />
    <meta name="twitter:image"       content="https://www.regestra.com/og-image.jpg" />
    <meta name="twitter:image:alt"   content="Regestra — Art platform for artists and art lovers" />

    <!-- ── iOS / Apple specific ── -->
    <meta name="apple-mobile-web-app-title" content="Regestra" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Theme color (browser chrome on mobile) ── -->
    <meta name="theme-color" content="#7c3aed" />
  </head>
  <body class="bg-gray-50">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
